<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Compras ERP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="erp-layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="system-name">COMPRAS ERP</span>
    </div>

    <div class="topbar-right">
      <button class="btn-light" onclick="toggleCopyMenu()">Copiar</button>
      <div id="copyMenu" class="dropdown hidden">
        <button onclick="copyCurrentList()">Bloco de Notas</button>
        <button onclick="copyWhatsApp()">WhatsApp</button>
      </div>
    </div>
  </header>

  <div class="body-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="menu-title">LISTAS</div>
      <div id="listsContainer"></div>
      <button class="btn-primary full" onclick="createNewList()">Nova Lista</button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <div class="page-header">
        <h2 id="currentListTitle">Lista Atual</h2>
      </div>

      <!-- FORM -->
      <div class="card form-card">
        <input type="text" id="itemName" placeholder="Descrição do Item">
        <input type="number" id="itemQty" placeholder="Qtd">
        <input type="number" id="itemPrice" placeholder="Valor Unitário">
        <button class="btn-primary" onclick="addItem()">Adicionar</button>
      </div>

      <!-- TABLE -->
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Status</th>
              <th>Item</th>
              <th>Qtd</th>
              <th>Valor</th>
              <th>Total</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="itemsContainer"></tbody>
        </table>
      </div>

      <div class="footer-total">
        Total Geral: <strong id="totalValue">R$ 0,00</strong>
      </div>

    </main>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
