<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras - Sistema</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <meta name="theme-color" content="#0F1115">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>📊 Sistema</h2>
    <nav>
      <button class="menu active">Lista de Compras</button>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <header class="topbar">
      <h1>Lista de Compras</h1>
      <span id="offlineBadge" class="offline hidden">Offline</span>
    </header>

    <!-- CARDS -->
    <section class="stats">
      <div class="statCard">
        <span>Total de Itens</span>
        <strong id="itemCount">0</strong>
      </div>

      <div class="statCard">
        <span>Total Geral</span>
        <strong id="grandTotal">R$ 0,00</strong>
      </div>
    </section>

    <!-- FORM -->
    <section class="formCard">
      <form id="itemForm">

        <div class="grid2">
          <input type="text" id="name" placeholder="Nome do Item" required>
          <select id="category" required></select>
        </div>

        <div class="grid3">
          <input type="number" id="quantity" placeholder="Quantidade" min="1" required>
          <input type="text" id="price" placeholder="Valor Unitário (R$)" required>
          <input type="text" id="market" placeholder="Supermercado">
        </div>

        <button type="submit" class="btnPrimary">Adicionar Item</button>

      </form>
    </section>

    <!-- FILTRO -->
    <section class="filter">
      <select id="filterCategory">
        <option value="all">Filtrar por Categoria</option>
      </select>
    </section>

    <!-- TABELA -->
    <section class="tableCard">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Categoria</th>
            <th>Qtd</th>
            <th>Valor</th>
            <th>Total</th>
            <th>Mercado</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="itemList"></tbody>
      </table>
    </section>

  </main>
</div>

<button id="copyBtn" class="floatingBtn">Copiar Lista</button>
<button id="installBtn" class="installBtn hidden">Instalar App</button>

<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>
</body>
</html>
