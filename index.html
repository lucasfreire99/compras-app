<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Compras System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <h2>COMPRAS</h2>
      <span>System</span>
    </div>

    <div class="sidebar-section">
      <h4>LISTAS</h4>
      <div id="listsContainer"></div>
      <button class="btn-primary" onclick="createNewList()">+ Nova Lista</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <header class="header">
      <h1 id="currentListTitle">Lista Atual</h1>

      <div class="header-actions">
        <div class="copy-dropdown">
          <button class="btn-secondary" onclick="toggleCopyMenu()">Copiar</button>
          <div id="copyMenu" class="copy-menu hidden">
            <button onclick="copyCurrentList()">Bloco de Notas</button>
            <button onclick="copyWhatsApp()">WhatsApp</button>
          </div>
        </div>
      </div>
    </header>

    <section class="content">

      <div class="card form-card">
        <input type="text" id="itemName" placeholder="Item">
        <input type="number" id="itemQty" placeholder="Qtd">
        <input type="number" id="itemPrice" placeholder="Preço">
        <button class="btn-primary" onclick="addItem()">Adicionar</button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Status</th>
              <th>Item</th>
              <th>Qtd</th>
              <th>Preço</th>
              <th>Total</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="itemsContainer"></tbody>
        </table>
      </div>

      <div class="total-box">
        Total Geral: <strong id="totalValue">R$ 0,00</strong>
      </div>

    </section>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
