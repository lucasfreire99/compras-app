<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compras App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Minhas Listas</h2>

    <ul id="listsContainer"></ul>

    <div class="newList">
      <input type="text" id="newListName" placeholder="Nova lista" />
      <button id="createListBtn">Criar</button>
    </div>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main">

    <h1 id="currentListTitle"></h1>

    <form id="itemForm">
      <input type="text" id="name" placeholder="Item" required />
      <input type="number" id="quantity" placeholder="Qtd" required />
      <input type="number" step="0.01" id="price" placeholder="Preço" required />
      <input type="text" id="market" placeholder="Mercado" />

      <select id="category"></select>

      <button type="submit">Adicionar</button>
    </form>

    <select id="filterCategory"></select>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Categoria</th>
          <th>Qtd</th>
          <th>Preço</th>
          <th>Total</th>
          <th>Mercado</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="itemList"></tbody>
    </table>

    <div class="summary">
      <span>Total: <strong id="grandTotal">R$ 0,00</strong></span>
      <span>Itens: <strong id="itemCount">0</strong></span>
    </div>

  </main>
</div>

<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>
</body>
</html>
