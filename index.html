<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="header">
            <h1>LISTA DE COMPRAS</h1>
            <div class="header-controls">
                <select id="supermercadoFilter" class="supermercado-select">
                    <option value="">TODOS OS SUPERMERCADOS</option>
                    <option value="COGEAL">COGEAL</option>
                    <option value="SALES">SALES</option>
                </select>
                
                <!-- DROPDOWN DE IMPORTAÇÃO -->
                <div class="dropdown import-dropdown">
                    <button class="btn-import" id="importBtn">📥 IMPORTAR ▼</button>
                    <div class="dropdown-content">
                        <a href="#" id="downloadModelo">📄 BAIXAR MODELO</a>
                        <a href="#" id="importCSV">📂 IMPORTAR CSV</a>
                    </div>
                </div>
                
                <div class="online-status" id="onlineStatus">● ONLINE</div>
            </div>
        </header>

        <!-- LISTA DE COMPRAS -->
        <main class="main-content">
            <div class="list-controls">
                <div class="filter-group">
                    <select id="categoriaFilter" class="filter-select">
                        <option value="">TODAS CATEGORIAS</option>
                    </select>
                    <button class="btn-secondary" id="novaCategoriaBtn">+ CATEGORIA</button>
                </div>
                <!-- Adicione após o botão novaCategoriaBtn -->
<div class="bulk-actions">
    <button class="btn-bulk" onclick="abrirAlteracaoLoteSupermercado()">
        🏷️ ALTERAR SUPERMERCADO EM LOTE
    </button>
    <button class="btn-bulk warning" onclick="abrirAlteracaoLoteCategoria()">
        📂 ALTERAR CATEGORIA EM LOTE
    </button>
</div>
                <div class="list-actions">
                    <span class="item-count" id="itemCount">0 ITENS</span>
                    
                    <!-- DROPDOWN COPIAR COM EXPORTAÇÃO -->
                    <div class="dropdown">
                        <button class="btn-secondary" id="copyBtn">COPIAR ▼</button>
                        <div class="dropdown-content">
                            <a href="#" id="copyWhatsapp">📱 WHATSAPP</a>
                            <a href="#" id="copyNotepad">📝 BLOCO DE NOTAS</a>
                            <a href="#" id="exportCSV">📊 EXPORTAR CSV</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BOTÃO ATUALIZAR PREÇOS (aparece quando há itens sem preço) -->
            <div id="priceUpdateBanner" class="price-update-banner" style="display: none;">
                <span>⚠️ ITENS COM PREÇO PENDENTE</span>
                <button class="btn-small" onclick="atualizarPrecosEmLote()">ATUALIZAR PREÇOS</button>
            </div>

            <!-- LISTA DE ITEMS -->
            <div id="itemsList" class="items-list"></div>
        </main>

        <!-- FLOATING ACTION BUTTON -->
        <button class="fab" id="addItemBtn">+</button>

        <!-- MODAL DE ADIÇÃO/EDIÇÃO -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <h2 id="modalTitle">ADICIONAR ITEM</h2>
                <form id="itemForm">
                    <input type="hidden" id="itemId">
                    
                    <div class="form-group">
                        <label>NOME DO ITEM *</label>
                        <input type="text" id="itemNome" class="uppercase-input" required maxlength="50" placeholder="EX: ARROZ">
                    </div>

                    <div class="form-group">
                        <label>QUANTIDADE *</label>
                        <input type="number" id="itemQuantidade" min="0.01" step="0.01" required value="1">
                    </div>

                    <div class="form-group">
                        <label>VALOR UNITÁRIO (R$) <span class="field-optional">(opcional)</span></label>
                        <input type="text" id="itemValor" placeholder="0,00" class="money-mask">
                        <small class="field-hint">Deixe em branco para preencher depois</small>
                    </div>

                    <div class="form-group">
                        <label>SUPERMERCADO</label>
                        <select id="itemSupermercado">
                            <option value="">SELECIONE</option>
                            <option value="COGEAL">COGEAL</option>
                            <option value="SALES">SALES</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>CATEGORIA *</label>
                        <select id="itemCategoria" required>
                            <option value="">SELECIONE</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>VALOR TOTAL: <span id="itemTotalPreview">R$ 0,00</span></label>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal()">CANCELAR</button>
                        <button type="submit" class="btn-primary">SALVAR</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- TOAST NOTIFICATION -->
        <div id="toast" class="toast"></div>

        <!-- BOTÃO INSTALAR -->
        <button id="installButton" class="install-button" style="display: none;">INSTALAR APP</button>

        <!-- INPUT FILE OCULTO PARA IMPORTAÇÃO -->
        <input type="file" id="fileInput" accept=".csv" style="display: none;">

        <!-- FOOTER FIXO -->
        <footer class="footer">
            <div class="total-info">
                <span>TOTAL GERAL:</span>
                <span id="grandTotal">R$ 0,00</span>
            </div>
            <div class="footer-badge" id="pendingBadge" style="display: none;">
                <span class="pending-count">0</span> ITENS SEM PREÇO
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
