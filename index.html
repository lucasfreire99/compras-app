<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras App</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e293b">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <aside class="sidebar" id="sidebar">
    <h2>Minhas Listas</h2>
    <div id="listsContainer"></div>
    <button onclick="createNewList()" class="primary-btn">+ Nova Lista</button>
  </aside>

  <main class="app-content">

    <header class="app-header">
      <button onclick="toggleSidebar()" class="menu-btn">☰</button>
      <h1 id="currentListTitle"></h1>

      <div class="copy-dropdown">
        <button onclick="toggleCopyMenu()" class="primary-btn">Copiar ▼</button>
        <div id="copyMenu" class="copy-menu hidden">
          <button onclick="copyTxt()">Bloco de Notas</button>
          <button onclick="copyWhatsApp()">WhatsApp</button>
        </div>
      </div>
    </header>

    <section class="content-body">

      <div class="form">
        <input type="text" id="itemName" placeholder="Item">
        <input type="number" id="itemQty" placeholder="Qtd">
        <input type="number" id="itemPrice" placeholder="Preço">
        <button onclick="addItem()" class="primary-btn">Adicionar</button>
      </div>

      <div id="itemsContainer"></div>

      <div class="total-box">
        Total Geral: <span id="totalValue">R$ 0,00</span>
      </div>

    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
